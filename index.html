<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kembali</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Inter',sans-serif;
  background:#f3f4f6;
  padding:20px;
}

.box{
  max-width:420px;
  margin:40px auto;
  background:#fff;
  border-radius:24px;
  padding:22px;
  box-shadow:0 15px 40px rgba(0,0,0,.06);
}

h2 i{
  font-size:35px;
}

h2{
  font-size:25px;
  font-weight:800;
  display:flex;
  align-items:center;
  gap:8px;
}

.badge{
  font-size:9px;
  font-weight:600;
  padding:2px 6px;
  border-radius:999px;
  background:#fef9c3;
  color:#92400e;
  border:1px solid #fde68a;
  position:relative;
  top:-6px;
}

.desc{
  font-size:14px;
  color:#777;
  margin:10px 0 18px;
}

.input-wrap{
  position:relative;
}

.input-wrap i{
  position:absolute;
  left:14px;
  top:50%;
  transform:translateY(-50%);
  color:#aaa;
}

input{
  width:100%;
  height:54px;
  border-radius:16px;
  border:1px solid #e5e7eb;
  padding:0 14px 0 40px;
  font-size:15px;
}

.btn-group{
  display:flex;
  gap:10px;
  margin-top:12px;
}

button{
  flex:1;
  height:50px;
  border:none;
  border-radius:16px;
  background:#111;
  color:#fff;
  font-weight:600;
  cursor:pointer;
}

button:disabled{
  opacity:.7;
  cursor:not-allowed;
}

#hasil{
  margin-top:16px;
}

.card{
  background:#fafafa;
  border-radius:18px;
  padding:16px;
  border:1px solid #eee;
}

.title{
  font-weight:700;
  margin-bottom:12px;
  display:flex;
  align-items:center;
  gap:8px;
}

.row{
  margin-bottom:12px;
}

.label{
  font-size:12px;
  color:#777;
}

.value{
  font-size:15px;
}

.red{color:#ef4444;font-weight:700;}
.green{color:#22c55e;font-weight:700;}
.gray{color:#6b7280;font-weight:700;}

.notice{
  margin-top:14px;
  padding:12px 14px;
  font-size:13px;
  font-weight:600;
  line-height:1.6;
  display:flex;
  gap:10px;
  border-radius:16px;
  border:1px solid rgba(0,0,0,.05);
  background:#fff;
  box-shadow:0 6px 14px rgba(0,0,0,.04);
}

.notice.red{
  background:#fef2f2;
  border:1px solid #fecaca;
  color:#b91c1c;
}

.notice.green{
  background:#ecfdf5;
  border:1px solid #bbf7d0;
  color:#166534;
}

.notice i{
  font-size:16px;
  margin-top:2px;
}

.notice{
  animation:fadeIn .3s ease;
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(6px);}
  to{opacity:1;transform:translateY(0);}
}

.progress{
  height:12px;
  background:#e5e7eb;
  border-radius:999px;
  overflow:hidden;
  margin:10px 0 14px;
}

.progress-bar{
  height:100%;
  background:linear-gradient(90deg,#22c55e,#16a34a);
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.box-mini{
  background:#fff;
  border-radius:14px;
  padding:10px;
  border:1px solid #eee;
}

.footer{
  text-align:center;
  margin-top:24px;
  font-size:12px;
  color:#999;
}
</style>
</head>

<body>

<div class="box">
  <h2>
    <i class="fa-solid fa-sim-card"></i>
    Circle Checker
    <span class="badge">by XC-Store</span>
  </h2>

  <div class="desc">Validasi Membership & Cek Kuota XL Circle</div>

  <div class="input-wrap">
    <i class="fa-solid fa-phone"></i>
    <input type="text" id="msisdn" placeholder="Masukkan nomor HP" inputmode="numeric" autocomplete="off">
  </div>

  <div class="btn-group">
    <button onclick="cekMembership()" id="btnMembership">Validasi Membership</button>
    <button onclick="cekKuota()" id="btnKuota">Cek Kuota</button>
  </div>

  <div id="hasil">Belum ada data.</div>
</div>

<div class="footer">© 2026 XC-Store. All Rights Reserved.</div>

<script>
const input = document.getElementById("msisdn");
const hasil = document.getElementById("hasil");
const btnMembership = document.getElementById("btnMembership");
const btnKuota = document.getElementById("btnKuota");

/* =========================================
   FORMAT TAMPILAN INPUT -> SELALU 0...
========================================= */
function normalizeInputNumber(value){
  let n = String(value || '').replace(/[^\d+]/g, '');

  if (n.startsWith('+')) {
    n = '+' + n.slice(1).replace(/\D/g, '');
  } else {
    n = n.replace(/\D/g, '');
  }

  if (n.startsWith('+62')) {
    n = '0' + n.slice(3);
  }
  else if (n.startsWith('62')) {
    n = '0' + n.slice(2);
  }
  else if (n.startsWith('8')) {
    n = '0' + n;
  }

  n = n.replace(/\D/g, '');

  return n;
}

/* =========================================
   FORMAT KE ENDPOINT LEON -> 62...
========================================= */
function formatMSISDN(value){
  let n = normalizeInputNumber(value);

  if (!n) return '';

  if (n.startsWith('0')) {
    n = '62' + n.slice(1);
  } else if (n.startsWith('8')) {
    n = '62' + n;
  }

  return n;
}

/* =========================================
   FORMAT KE ENDPOINT BENDITH/PROXY -> 0...
========================================= */
function formatMSISDNZero(value){
  let n = normalizeInputNumber(value);

  if (!n) return '';

  if (n.startsWith('62')) {
    n = '0' + n.slice(2);
  } else if (n.startsWith('8')) {
    n = '0' + n;
  }

  return n;
}

function escapeHtml(str){
  return String(str ?? "-")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function setLoading(button, text){
  button.disabled = true;
  button.dataset.originalText = button.innerHTML;
  button.innerHTML = text;
}

function unsetLoading(button){
  button.disabled = false;
  if(button.dataset.originalText){
    button.innerHTML = button.dataset.originalText;
  }
}

/* auto rapikan saat ketik */
input.addEventListener('input', function(){
  this.value = normalizeInputNumber(this.value);
});

/* auto rapikan saat paste */
input.addEventListener('paste', function(){
  setTimeout(() => {
    this.value = normalizeInputNumber(this.value);
  }, 0);
});

/* ================= MEMBERSHIP ================= */
async function cekMembership(){
  const msisdn62 = formatMSISDN(input.value);
  const msisdn0 = formatMSISDNZero(input.value);

  if(!msisdn0){
    hasil.innerHTML = "Isi nomor dulu";
    return;
  }

  setLoading(btnMembership, "Loading...");
  hasil.innerHTML = "Loading...";

  try{
    /* 1. PRIORITAS PROXY BENDITH */
    try{
      const resProxy = await fetch(`/api/membership?number=${encodeURIComponent(msisdn0)}`, {
        cache: 'no-store'
      });
      const rawProxy = await resProxy.text();

      let dataProxy;
      try{
        dataProxy = JSON.parse(rawProxy);
      }catch{
        dataProxy = null;
      }

      if(dataProxy && dataProxy.success === true && dataProxy.data){
        const canSubscribe = dataProxy.data.can_subscribe === true;
        const infoText = dataProxy.data.information || "-";
        const statusText = canSubscribe ? "Bisa beli paket Circle" : "Tidak bisa beli paket Circle";
        const statusColor = canSubscribe ? "green" : "red";

        let notice = "";

        if(statusColor === "red"){
          notice = `<div class="notice red">
            <i class="fa-solid fa-circle-xmark"></i>
            Nomor ini sudah terdaftar di group Circle, jadi belum bisa beli lagi.
          </div>`;
        }

        if(statusColor === "green"){
          notice = `<div class="notice green">
            <i class="fa-solid fa-circle-check"></i>
            Nomor ini belum terdaftar di group Circle, jadi bisa lanjut beli paket.
          </div>`;
        }

        hasil.innerHTML = `
          <div class="card">
            <div class="title"><i class="fa-solid fa-id-card"></i> Membership</div>

            <div class="row">
              <div class="label">MSISDN</div>
              <div class="value">${escapeHtml(msisdn0)}</div>
            </div>

            <div class="row">
              <div class="label">Status</div>
              <div class="value ${statusColor}">${escapeHtml(statusText)}</div>
            </div>

            <div class="row">
              <div class="label">Keterangan</div>
              <div class="value">${escapeHtml(infoText)}</div>
            </div>

            ${notice}
          </div>
        `;
        return;
      }
    }catch(e){
      console.warn("Proxy bendith gagal:", e);
    }

    /* 2. FALLBACK LEONSKENNEDY */
    try{
      const res = await fetch(`https://leonskennedy.my.id/cekcircle/cek_membership.php?msisdn=${encodeURIComponent(msisdn62)}`, {
        cache: 'no-store'
      });
      const raw = await res.text();

      let data;
      try{
        data = JSON.parse(raw);
      }catch{
        data = null;
      }

      if(!data || !data.ok){
        hasil.innerHTML = "Gagal ambil data";
        return;
      }

      const statusText = data.membership?.status_text || "-";
      const statusColor = (data.membership?.status_color || "gray").toLowerCase();

      let notice = "";

      if(statusColor === "red"){
        notice = `<div class="notice red">
          <i class="fa-solid fa-circle-xmark"></i>
          Tidak bisa beli paket XL Circle saat ini, coba lagi bulan depan.
        </div>`;
      }

      if(statusColor === "green"){
        notice = `<div class="notice green">
          <i class="fa-solid fa-circle-check"></i>
          Bisa beli paket XL Circle sekarang!
        </div>`;
      }

      hasil.innerHTML = `
        <div class="card">
          <div class="title"><i class="fa-solid fa-id-card"></i> Membership</div>

          <div class="row">
            <div class="label">MSISDN</div>
            <div class="value">${escapeHtml(data.msisdn || msisdn62)}</div>
          </div>

          <div class="row">
            <div class="label">Status</div>
            <div class="value ${statusColor}">${escapeHtml(statusText)}</div>
          </div>

          ${notice}
        </div>
      `;
      return;

    }catch(e){
      hasil.innerHTML = "Error membership";
      console.error(e);
    }
  }finally{
    unsetLoading(btnMembership);
  }
}

/* ================= KUOTA ================= */
async function cekKuota(){
  const msisdn62 = formatMSISDN(input.value);
  const msisdn0 = formatMSISDNZero(input.value);

  if(!msisdn0){
    hasil.innerHTML = "Isi nomor dulu";
    return;
  }

  setLoading(btnKuota, "Loading...");
  hasil.innerHTML = "Loading...";

  try{
    /* kuota lewat proxy agar lolos CORS */
    const res = await fetch(`/api/cek?number=${encodeURIComponent(msisdn0)}`, {
      cache: 'no-store'
    });
    const raw = await res.text();

    let data;
    try{
      data = JSON.parse(raw);
    }catch{
      hasil.innerHTML = "Gagal ambil kuota";
      return;
    }

    if(!data.success){
      hasil.innerHTML = escapeHtml(data.message || "Gagal ambil kuota");
      return;
    }

    const subs = data.data?.subs_info || {};
    const pkgInfo = data.data?.package_info || {};
    const packages = Array.isArray(pkgInfo.packages) ? pkgInfo.packages : [];

    let totalGb = 0;
    let usedGb = 0;
    let remainingGb = 0;

    for(const pkg of packages){
      const quotas = Array.isArray(pkg.quotas) ? pkg.quotas : [];
      for(const q of quotas){
        const total = parseFloat(String(q.total || "0").replace(",", ".").replace(/[^\d.]/g, ""));
        const remaining = parseFloat(String(q.remaining || "0").replace(",", ".").replace(/[^\d.]/g, ""));
        const percent = parseFloat(String(q.percent || "0").replace(",", ".").replace(/[^\d.]/g, ""));

        if(!isNaN(total)) totalGb += total;
        if(!isNaN(remaining)) remainingGb += remaining;

        if(!isNaN(total) && !isNaN(percent) && total > 0){
          const used = total * (percent / 100);
          usedGb += used;
        }
      }
    }

    if (usedGb < 0) usedGb = 0;
    if (remainingGb < 0) remainingGb = 0;
    if (totalGb < 0) totalGb = 0;

    if (usedGb > totalGb && totalGb > 0) {
      usedGb = totalGb;
    }

    let joined = subs.id_verified || "-";
    let expired = subs.exp_date || "-";

    let isExpired = false;
    if (expired && expired !== "-") {
      const today = new Date();
      const expDate = new Date(expired + "T23:59:59");
      if (!isNaN(expDate.getTime()) && today > expDate) {
        isExpired = true;
      }
    }

    let usagePct = 0;
    if (totalGb > 0) {
      usagePct = (usedGb / totalGb) * 100;
    }

    if (isExpired && totalGb > 0) {
      usedGb = totalGb;
      remainingGb = 0;
      usagePct = 100;
    }

    if (!isExpired && totalGb > 0 && remainingGb === 0 && usedGb === 0) {
      usedGb = totalGb;
      usagePct = 100;
    }

    if (usagePct < 0) usagePct = 0;
    if (usagePct > 100) usagePct = 100;

    const totalText = `${totalGb.toFixed(2)} GB`;
    const usedText = `${usedGb.toFixed(2)} GB`;
    const remainingText = `${remainingGb.toFixed(2)} GB`;
    const pctText = `${Math.round(usagePct)}%`;

    let notice = "";
    let progressColor = "linear-gradient(90deg,#22c55e,#16a34a)";

    if (isExpired) {
      progressColor = "linear-gradient(90deg,#ef4444,#dc2626)";
      notice = `
        <div class="notice red">
          <i class="fa-solid fa-circle-exclamation"></i>
          Paket XL Circle sudah kedaluwarsa / melewati masa aktif.
        </div>
      `;
    } else if (remainingGb <= 0 && totalGb > 0) {
      progressColor = "linear-gradient(90deg,#ef4444,#dc2626)";
      notice = `
        <div class="notice red">
          <i class="fa-solid fa-circle-exclamation"></i>
          Kuota XL Circle sudah habis.
        </div>
      `;
    }

    hasil.innerHTML = `
      <div class="card">
        <div class="title"><i class="fa-solid fa-chart-simple"></i> Kuota XL Circle</div>

        <div class="row" style="display:flex;justify-content:space-between;align-items:center;">
          <div class="label">Sisa Kuota</div>
          <div class="value"><b>${remainingText}</b></div>
        </div>

        <div class="progress">
          <div class="progress-bar" style="width:${usagePct}%; background:${progressColor};"></div>
        </div>

        <div class="grid">
          <div class="box-mini">
            <div class="label">Total</div>
            <div class="value">${totalText}</div>
          </div>

          <div class="box-mini">
            <div class="label">Terpakai</div>
            <div class="value">${usedText} (${pctText})</div>
          </div>

          <div class="box-mini">
            <div class="label">Bergabung</div>
            <div class="value">${escapeHtml(joined)}</div>
          </div>

          <div class="box-mini">
            <div class="label">Kadaluwarsa</div>
            <div class="value">${escapeHtml(expired)}</div>
          </div>
        </div>

        ${notice}
      </div>
    `;

  }catch(e){
    hasil.innerHTML = "Error kuota";
    console.error(e);
  }finally{
    unsetLoading(btnKuota);
  }
}
</script>

</body>
</html>
