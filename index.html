<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kembali</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Inter',sans-serif;
  background:#f3f4f6;
  padding:20px;
}

.box{
  max-width:420px;
  margin:40px auto;
  background:#fff;
  border-radius:24px;
  padding:22px;
  box-shadow:0 15px 40px rgba(0,0,0,.06);
}

h2{
  font-size:25px;
  font-weight:800;
  display:flex;
  align-items:center;
  gap:8px;
}

.badge{
  font-size:9px;
  font-weight:600;
  padding:2px 6px;
  border-radius:999px;
  background:#fef9c3;
  color:#92400e;
  border:1px solid #fde68a;
  position:relative;
  top:-6px;
}

.desc{
  font-size:14px;
  color:#777;
  margin:10px 0 18px;
}

.input-wrap{
  position:relative;
}

.input-wrap i{
  position:absolute;
  left:14px;
  top:50%;
  transform:translateY(-50%);
  color:#aaa;
}

input{
  width:100%;
  height:54px;
  border-radius:16px;
  border:1px solid #e5e7eb;
  padding:0 14px 0 40px;
  font-size:15px;
}

.btn-group{
  margin-top:12px;
}

button{
  width:100%;
  height:50px;
  border:none;
  border-radius:16px;
  background:#111;
  color:#fff;
  font-weight:600;
  cursor:pointer;
}

#hasil{
  margin-top:16px;
}

.card{
  background:#fafafa;
  border-radius:18px;
  padding:16px;
  border:1px solid #eee;
}

.title{
  font-weight:700;
  margin-bottom:12px;
  display:flex;
  align-items:center;
  gap:8px;
}

.row{
  margin-bottom:12px;
}

.label{
  font-size:12px;
  color:#777;
}

.value{
  font-size:15px;
}

.red{color:#ef4444;font-weight:700;}
.green{color:#22c55e;font-weight:700;}

.notice{
  margin-top:14px;
  padding:12px 14px;
  font-size:13px;
  font-weight:600;
  line-height:1.6;
  display:flex;
  gap:10px;
  border-radius:16px;
}

.notice.red{
  background:#fef2f2;
  border:1px solid #fecaca;
  color:#b91c1c;
}

.notice.green{
  background:#ecfdf5;
  border:1px solid #bbf7d0;
  color:#166534;
}

.footer{
  text-align:center;
  margin-top:24px;
  font-size:12px;
  color:#999;
}
</style>
</head>

<body>

<div class="box">
  <h2>
    <i class="fa-solid fa-sim-card"></i>
    Circle Checker
    <span class="badge">by XC-Store</span>
  </h2>

  <div class="desc">Validasi Membership XL Circle</div>

  <div class="input-wrap">
    <i class="fa-solid fa-phone"></i>
    <input type="text" id="msisdn" placeholder="Masukkan nomor HP" inputmode="numeric" autocomplete="off">
  </div>

  <div class="btn-group">
    <button onclick="cekMembership()">Validasi Membership</button>
  </div>

  <div id="hasil">Belum ada data.</div>
</div>

<div class="footer">© 2026 XC-Store. All Rights Reserved.</div>

<script>
const input = document.getElementById("msisdn");
const hasil = document.getElementById("hasil");

/* FORMAT INPUT */
function normalizeInputNumber(value){
  let n = String(value || '').replace(/[^\d+]/g, '');

  if (n.startsWith('+')) {
    n = '+' + n.slice(1).replace(/\D/g, '');
  } else {
    n = n.replace(/\D/g, '');
  }

  if (n.startsWith('+62')) n = '0' + n.slice(3);
  else if (n.startsWith('62')) n = '0' + n.slice(2);
  else if (n.startsWith('8')) n = '0' + n;

  return n.replace(/\D/g, '');
}

function formatMSISDN(value){
  let n = normalizeInputNumber(value);
  if (!n) return '';

  if (n.startsWith('0')) n = '62' + n.slice(1);
  else if (n.startsWith('8')) n = '62' + n;

  return n;
}

input.addEventListener('input', function(){
  this.value = normalizeInputNumber(this.value);
});

input.addEventListener('paste', function(){
  setTimeout(() => {
    this.value = normalizeInputNumber(this.value);
  }, 0);
});

/* ================= MEMBERSHIP ================= */
async function cekMembership(){
  const msisdn = formatMSISDN(input.value);
  const msisdnZero = normalizeInputNumber(input.value);

  if(!msisdnZero){
    hasil.innerHTML = "Isi nomor dulu";
    return;
  }

  hasil.innerHTML = "Loading...";

  try{
    try{
      const resProxy = await fetch(`/api/membership?number=${encodeURIComponent(msisdnZero)}`, {
        cache: 'no-store'
      });

      const text = await resProxy.text();

      let dataProxy;
      try{ dataProxy = JSON.parse(text); }catch{ dataProxy = null; }

      if(dataProxy && dataProxy.success === true && dataProxy.data){
        const canSubscribe = dataProxy.data.can_subscribe === true;
        const info = (dataProxy.data.information || "").toLowerCase();

        let statusText = "";
        let statusColor = "";

        if(info.includes("sudah terdaftar")){
          statusText = "Masih/Sedang Tergabung Dalam Circle";
          statusColor = "red";
        }
        else if(info.includes("belum memenuhi syarat")){
          statusText = "Umur kartu masih di bawah 60 hari";
          statusColor = "red";
        }
        else if(info.includes("belum terdaftar")){
          statusText = "Tidak tergabung Dalam Circle";
          statusColor = "green";
        }
        else{
          statusText = canSubscribe ? "Bisa beli paket Circle" : "Tidak bisa beli paket Circle";
          statusColor = canSubscribe ? "green" : "red";
        }

        let notice = statusColor === "green"
          ? `<div class="notice green"><i class="fa-solid fa-circle-check"></i>Bisa beli paket XL Circle sekarang!</div>`
          : `<div class="notice red"><i class="fa-solid fa-circle-xmark"></i>Tidak bisa beli paket XL Circle saat ini, coba lagi bulan depan.</div>`;

        hasil.innerHTML = `
          <div class="card">
            <div class="title"><i class="fa-solid fa-id-card"></i> Membership</div>
            <div class="row"><div class="label">MSISDN</div><div class="value">${msisdnZero}</div></div>
            <div class="row"><div class="label">Status</div><div class="value ${statusColor}">${statusText}</div></div>
            ${notice}
          </div>
        `;
        return;
      }

    }catch(e){
      console.warn("Bendith gagal:", e);
    }

    const res = await fetch(`https://leonskennedy.my.id/cekcircle/cek_membership.php?msisdn=${msisdn}`);
    const data = await res.json();

    if(!data.ok){
      hasil.innerHTML = "Gagal ambil data";
      return;
    }

    const statusText = data.membership?.status_text || "-";
    const statusColor = (data.membership?.status_color || "gray").toLowerCase();

    let notice = statusColor === "green"
      ? `<div class="notice green"><i class="fa-solid fa-circle-check"></i>Bisa beli paket XL Circle sekarang!</div>`
      : `<div class="notice red"><i class="fa-solid fa-circle-xmark"></i>Tidak bisa beli paket XL Circle saat ini, coba lagi bulan depan.</div>`;

    hasil.innerHTML = `
      <div class="card">
        <div class="title"><i class="fa-solid fa-id-card"></i> Membership</div>
        <div class="row"><div class="label">MSISDN</div><div class="value">${data.msisdn}</div></div>
        <div class="row"><div class="label">Status</div><div class="value ${statusColor}">${statusText}</div></div>
        ${notice}
      </div>
    `;

  }catch(e){
    hasil.innerHTML = "Error membership";
    console.error(e);
  }
}
</script>

</body>
</html>
